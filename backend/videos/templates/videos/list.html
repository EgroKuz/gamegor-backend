<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GameGor — Видеоконтент</title>
  <style>
    body { margin:0; font-family:Inter, Arial, sans-serif; background:#0b1220; color:#e5e7eb; }
    .wrap { max-width:1100px; margin:24px auto; padding:0 16px; }
    .top { display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
    .btn { background:#334155; color:#e2e8f0; text-decoration:none; padding:10px 14px; border-radius:10px; }
    .muted { color:#9ca3af; }
    .search { display:flex; gap:10px; margin:16px 0; }
    input { flex:1; border:1px solid #2b3a52; background:#111827; color:#e5e7eb; border-radius:10px; padding:11px 12px; }
    button { border:none; background:#22c55e; color:#052e16; font-weight:700; border-radius:10px; padding:11px 14px; cursor:pointer; }
    .grid { display:grid; gap:14px; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); }
    .card { background:#111827; border:1px solid #253042; border-radius:14px; overflow:hidden; display:flex; flex-direction:column; }
    .cover { width:100%; height:150px; object-fit:cover; background:#0f172a; }
    .content { padding:12px; }
    .title { font-size:16px; font-weight:700; margin-bottom:6px; }
    .meta { font-size:13px; color:#9ca3af; margin-bottom:6px; }
    .watch { margin-top:auto; display:block; text-align:center; text-decoration:none; color:#e2e8f0; background:#1e293b; padding:10px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>Видеоконтент</h1>
        <div class="muted">Подборка видео по играм, авторам и тегам.</div>
      </div>
      <a class="btn" href="/">← На главную</a>
    </div>

    <form id="search-form" class="search">
      <input id="search-input" placeholder="Поиск по видео и авторам"/>
      <button type="submit">Найти</button>
    </form>

    <div id="count" class="muted" style="margin-bottom:10px"></div>
    <section id="videos-grid" class="grid"></section>
  </div>

  <script>
    const form = document.getElementById('search-form');
    const input = document.getElementById('search-input');
    const grid = document.getElementById('videos-grid');
    const count = document.getElementById('count');
    let isAdmin = false;
    const params = new URLSearchParams(window.location.search);
    const initialTags = params.get('tags') || '';
    if (initialTags) {
      input.value = initialTags;
    }



    async function detectAdmin() {
      const token = localStorage.getItem('access_token');
      if (!token) return false;
      const response = await fetch('/api/users/profile/', {
        headers: { Authorization: `Bearer ${token}` }
      });
      if (!response.ok) return false;
      const user = await response.json();
      return user.username === 'admin';
    }

    async function editVideo(videoId) {
      const title = prompt('Новое название видео:');
      if (title === null) return;
      const tags = prompt('Новые теги через запятую:');
      if (tags === null) return;

      const response = await fetch(`/api/videos/${videoId}/`, {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${localStorage.getItem('access_token')}`,
        },
        body: JSON.stringify({
          title: title.trim(),
          tags: tags.split(',').map((t) => t.trim()).filter(Boolean),
        }),
      });

      if (!response.ok) {
        alert('Не удалось обновить видео.');
        return;
      }

      alert('Видео обновлено.');
      loadVideos(input.value.trim());
    }

    function card(v) {
      return `
      <article class="card">
        <img class="cover" src="${v.thumbnail || 'https://placehold.co/640x360?text=Video'}" alt="${v.title}"/>
        <div class="content">
          <div class="title">${v.title}</div>
          <div class="meta">Автор: ${v.author_name || '—'}</div>
          <div class="meta">Тип: ${v.video_type || '—'}</div>
          <div class="meta">Теги: ${Array.isArray(v.tags) && v.tags.length ? v.tags.join(', ') : '—'}</div>
        </div>
        ${isAdmin ? `<button class="watch" type="button" onclick="editVideo(${v.id})">Редактировать видео (admin)</button>` : ''}
        <a class="watch" href="${v.url}" target="_blank" rel="noopener noreferrer">Смотреть видео</a>
      </article>`;
    }

    async function loadVideos(search = '') {
      const query = search ? `?search=${encodeURIComponent(search)}` : '';
      const response = await fetch(`/api/videos/${query}`);
      if (!response.ok) {
        count.textContent = 'Не удалось загрузить видео.';
        return;
      }

      const data = await response.json();
      const videos = Array.isArray(data) ? data : (data.results || []);
      count.textContent = `Найдено видео: ${videos.length}`;
      grid.innerHTML = videos.length ? videos.map(card).join('') : '<div class="muted">Видео не найдены.</div>';
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      loadVideos(input.value.trim());
    });

    detectAdmin().then((value) => { isAdmin = value; loadVideos(initialTags); });
  </script>
</body>
</html>
