<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameGor — Видеоконтент</title>
  <style>
    body { margin:0; font-family: Inter, Arial, sans-serif; background:#0b1220; color:#e5e7eb; }
    .wrap { max-width:1100px; margin:24px auto; padding:0 16px; }
    .top { display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:16px; }
    .top a { color:#93c5fd; text-decoration:none; }
    .controls { display:grid; grid-template-columns: 1fr 220px 120px; gap:10px; margin-bottom:18px; }
    input, select { border:1px solid #2b3a52; background:#111827; color:#e5e7eb; border-radius:10px; padding:11px 12px; }
    button { border:none; background:#22c55e; color:#052e16; font-weight:700; border-radius:10px; padding:11px 14px; cursor:pointer; }
    .grid { display:grid; gap:14px; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
    .card { background:#111827; border:1px solid #253042; border-radius:14px; overflow:hidden; display:flex; flex-direction:column; }
    .thumb { width:100%; height:150px; object-fit:cover; background:#0f172a; }
    .content { padding:12px; }
    .title { font-size:16px; font-weight:700; margin-bottom:6px; }
    .meta { color:#9ca3af; font-size:13px; margin-bottom:6px; }
    .watch { margin-top:auto; display:block; text-align:center; text-decoration:none; color:#e2e8f0; background:#1e293b; padding:10px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>Видеоконтент</h1>
      <a href="/">← На главную</a>
    </div>

    <form id="filter-form" class="controls">
      <input id="search-input" placeholder="Поиск по названию видео, тегам и авторам" />
      <select id="game-select">
        <option value="">Все игры</option>
      </select>
      <button type="submit">Применить</button>
    </form>

    <section id="videos-grid" class="grid"></section>
  </div>

  <script>
    const form = document.getElementById('filter-form');
    const input = document.getElementById('search-input');
    const gameSelect = document.getElementById('game-select');
    const grid = document.getElementById('videos-grid');

    function card(video) {
      return `
      <article class="card">
        <img class="thumb" src="${video.thumbnail || 'https://placehold.co/640x360?text=Video'}" alt="${video.title}" />
        <div class="content">
          <div class="title">${video.title}</div>
          <div class="meta">Игра: ${video.game_title || '—'}</div>
          <div class="meta">Тип: ${video.video_type || '—'}</div>
          <div class="meta">Просмотры: ${video.views_count ?? 0}</div>
        </div>
        <a class="watch" href="${video.url}" target="_blank" rel="noopener noreferrer">Смотреть</a>
      </article>`;
    }

    async function loadGames() {
      const response = await fetch('/api/games/');
      if (!response.ok) return;
      const data = await response.json();
      const games = Array.isArray(data) ? data : (data.results || []);
      games.forEach((game) => {
        const option = document.createElement('option');
        option.value = game.id;
        option.textContent = game.title;
        gameSelect.appendChild(option);
      });
    }

    async function loadVideos() {
      const params = new URLSearchParams();
      if (input.value.trim()) params.set('search', input.value.trim());
      if (gameSelect.value) params.set('game', gameSelect.value);

      const query = params.toString() ? `?${params.toString()}` : '';
      const response = await fetch(`/api/videos/${query}`);
      if (!response.ok) {
        grid.innerHTML = '<div class="meta">Не удалось загрузить видео.</div>';
        return;
      }

      const data = await response.json();
      const videos = Array.isArray(data) ? data : (data.results || []);
      grid.innerHTML = videos.length ? videos.map(card).join('') : '<div class="meta">Видео не найдены.</div>';
    }

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      loadVideos();
    });

    async function init() {
      const initialParams = new URLSearchParams(window.location.search);
      const initialSearch = initialParams.get('search') || '';
      const initialGame = initialParams.get('game') || '';
      input.value = initialSearch;

      await loadGames();
      if (initialGame) gameSelect.value = initialGame;
      await loadVideos();
    }

    init();
  </script>
</body>
</html>
