<!DOCTYPE html><html lang='ru'><head><meta charset='UTF-8'/><meta name='viewport' content='width=device-width, initial-scale=1.0'/><title>GameGor — Видеоконтент</title></head><body><div class='wrap'><h1>Видеоконтент</h1><a href='/'>← На главную</a><form id='search-form'><input id='search-input' placeholder='Поиск по видео и авторам'/><button type='submit'>Найти</button></form><section id='videos-grid'></section></div><script>
const form=document.getElementById('search-form');const input=document.getElementById('search-input');const grid=document.getElementById('videos-grid');function card(v){return `<article><img src="${v.thumbnail||'https://placehold.co/640x360?text=Video'}" alt="${v.title}" style="width:240px;height:130px;object-fit:cover"/><h3>${v.title}</h3><p>Автор: ${v.author_name||'—'}</p><p>Тип: ${v.video_type||'—'}</p><a href="${v.url}" target="_blank" rel="noopener noreferrer">Смотреть видео</a></article>`;}async function loadVideos(search=''){const query=search?`?search=${encodeURIComponent(search)}`:'';const response=await fetch(`/api/videos/${query}`);if(!response.ok){grid.innerHTML='<div>Не удалось загрузить видео.</div>';return;}const data=await response.json();const videos=Array.isArray(data)?data:(data.results||[]);grid.innerHTML=videos.length?videos.map(card).join(''):'<div>Видео не найдены.</div>';}form.addEventListener('submit',(e)=>{e.preventDefault();loadVideos(input.value.trim());});loadVideos();
</script></body></html>
