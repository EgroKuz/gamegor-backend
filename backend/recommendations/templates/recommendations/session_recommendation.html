<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>GameGor — Рекомендация</title></head><body><div class="wrap"><div class="card"><h1>Рекомендация по игровой сессии</h1><p class="muted">Ниже отображается текстовая рекомендация по вашей последней сессии. Позже здесь будет интегрирован ИИ-модуль.</p><div id="game" class="muted"></div><div id="tags" class="muted" style="margin-top:6px"></div><div class="recommendation" id="text"></div><div class="row"><a id="videos-btn" class="btn primary" href="/videos/">Видео по этим тегам</a><a class="btn secondary" href="/">На главную</a></div></div></div><style>body { margin:0; font-family: Inter, Arial, sans-serif; background:#0b1220; color:#e5e7eb; }.wrap { max-width:900px; margin:32px auto; padding:0 16px; }.card { background:#111827; border:1px solid #253042; border-radius:14px; padding:18px; }.muted { color:#9ca3af; }.recommendation { margin-top:12px; background:#0b1020; border:1px solid #2b3a52; border-radius:10px; padding:14px; line-height:1.5; }.row { display:flex; gap:10px; margin-top:14px; flex-wrap:wrap; }.btn { border:none; border-radius:10px; padding:10px 14px; font-weight:700; text-decoration:none; cursor:pointer; }.primary { background:#22c55e; color:#052e16; }.secondary { background:#334155; color:#e2e8f0; }</style><script>const params = new URLSearchParams(window.location.search);const gameId = params.get('game') || '—';const tags = params.get('tags') || '';document.getElementById('game').textContent = `Игра ID: ${gameId}`;document.getElementById('tags').textContent = `Теги сессии: ${tags || 'не указаны'}`;const text = tags ? `Рекомендация: уделите внимание тренировке по направлениям: ${tags}. Сфокусируйтесь на коротких ежедневных практиках и разбирайте ошибки после каждой катки.` : 'Рекомендация: добавьте теги в сессии, чтобы система формировала более точные и персонализированные советы.';document.getElementById('text').textContent = text;document.getElementById('videos-btn').href = `/videos/?tags=${encodeURIComponent(tags)}`;</script></body></html>
