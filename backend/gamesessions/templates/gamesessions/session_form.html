<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameGor — Добавить игровую сессию</title>
  <style>
    body { margin:0; font-family: Inter, Arial, sans-serif; background:#0b1220; color:#e5e7eb; }
    .wrap { max-width:900px; margin:24px auto; padding:0 16px; }
    .card { background:#111827; border:1px solid #253042; border-radius:14px; overflow:hidden; }
    .cover { width:100%; height:240px; object-fit:cover; background:#0f172a; }
    .content { padding:16px; }
    h1 { margin:0 0 8px; }
    .muted { color:#9ca3af; }
    .grid { display:grid; gap:12px; grid-template-columns: 1fr 1fr; margin-top:12px; }
    .field { display:flex; flex-direction:column; gap:6px; }
    .full { grid-column:1 / -1; }
    input, textarea, select { border:1px solid #2b3a52; background:#0b1020; color:#e5e7eb; border-radius:10px; padding:10px 12px; }
    textarea { min-height:120px; resize:vertical; }
    .actions { margin-top:14px; display:flex; gap:10px; }
    button, a.btn { border:none; border-radius:10px; padding:10px 14px; font-weight:700; text-decoration:none; cursor:pointer; }
    button { background:#22c55e; color:#052e16; }
    a.btn { background:#334155; color:#e2e8f0; }
    .result { min-height:22px; margin-top:12px; }
    .ok { color:#4ade80; } .error { color:#f87171; }
    @media (max-width: 720px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <p><a href="/games/{{ game_id }}/" style="color:#93c5fd;text-decoration:none;">← Назад к игре</a></p>
    <article class="card">
      <img class="cover" id="cover" alt="Обложка игры" />
      <div class="content">
        <h1 id="title">Добавление игровой сессии</h1>
        <div class="muted" id="subtitle">Загрузка данных игры...</div>

        <form id="session-form">
          <div class="grid">
            <div class="field">
              <label>Оценка игровой сессии (1-10)</label>
              <select name="rating" required>
                <option value="">Выберите оценку</option>
                <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
                <option>6</option><option>7</option><option>8</option><option>9</option><option>10</option>
              </select>
            </div>
            <div class="field">
              <label>Теги проблем (через запятую)</label>
              <input name="tags" placeholder="aim, tactics, map_knowledge" />
            </div>
            <div class="field full">
              <label>Текст отзыва о сессии</label>
              <textarea name="comment" placeholder="Опишите, как прошла игра..." required></textarea>
            </div>
          </div>
          <div class="actions">
            <button type="submit">Сохранить сессию</button>
            <a class="btn" id="to-stats" href="/api/stats-page/">Перейти к статистике</a>
          </div>
        </form>
        <div id="result" class="result"></div>
      </div>
    </article>
  </div>

  <script>
    const gameId = Number('{{ game_id }}');
    const form = document.getElementById('session-form');
    const result = document.getElementById('result');

    function show(message, ok=true) {
      result.textContent = message;
      result.className = `result ${ok ? 'ok' : 'error'}`;
    }

    function token() { return localStorage.getItem('access_token'); }

    async function loadGameInfo() {
      const response = await fetch(`/api/games/${gameId}/`);
      if (!response.ok) {
        document.getElementById('subtitle').textContent = 'Не удалось загрузить игру';
        return;
      }

      const game = await response.json();
      document.getElementById('title').textContent = `Сессия по игре: ${game.title}`;
      document.getElementById('subtitle').textContent = `${game.genre || 'Жанр не указан'} • ${game.developer || 'Разработчик не указан'}`;
      document.getElementById('cover').src = game.cover_image || 'https://placehold.co/1200x500?text=Game+Session';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      if (!token()) {
        show('Нужна авторизация. Сначала выполните вход на /api/auth/.', false);
        return;
      }

      const payload = {
        game: gameId,
        rating: Number(form.rating.value),
        comment: form.comment.value.trim(),
        tags: form.tags.value
          .split(',')
          .map((t) => t.trim())
          .filter(Boolean),
      };

      const response = await fetch('/api/sessions/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${token()}`,
        },
        body: JSON.stringify(payload),
      });

      const data = await response.json();
      if (!response.ok) {
        show(`Ошибка сохранения: ${JSON.stringify(data)}`, false);
        return;
      }

      show('Игровая сессия успешно сохранена.');
      form.reset();
    });

    loadGameInfo();
  </script>
</body>
</html>
