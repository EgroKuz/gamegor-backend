<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameGor — Страница игры</title>
  <style>
    body { margin:0; font-family: Inter, Arial, sans-serif; background:#0b1220; color:#e5e7eb; }
    .wrap { max-width:920px; margin:24px auto; padding:0 16px; }
    a { color:#93c5fd; text-decoration:none; }
    .card { background:#111827; border:1px solid #253042; border-radius:14px; overflow:hidden; }
    .cover { width:100%; height:320px; object-fit:cover; background:#0f172a; }
    .content { padding:18px; }
    .title { font-size:30px; margin:0 0 10px; }
    .meta { color:#cbd5e1; margin-bottom:8px; }
    .desc { color:#d1d5db; line-height:1.5; white-space:pre-line; }
    .chips { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
    .chip { background:#1e293b; color:#e2e8f0; border-radius:999px; padding:6px 10px; font-size:13px; text-decoration:none; }
    .chip.disabled { opacity:0.6; cursor:not-allowed; }
  </style>
</head>
<body>
  <div class="wrap">
    <p><a href="/">← На главную</a></p>
    <article class="card" id="game-card">
      <img class="cover" id="cover" alt="cover" />
      <div class="content">
        <h1 class="title" id="title">Загрузка...</h1>
        <div class="meta" id="genre"></div>
        <div class="meta" id="developer"></div>
        <div class="meta" id="release"></div>
        <div class="meta" id="achievements"></div>
        <div class="desc" id="description"></div>
        <div class="chips" style="margin-top:14px;">
          <a id="session-link" class="chip" href="#">Добавить игровую сессию</a>
          <a id="stats-link" class="chip" href="/api/stats-page/">Статистика</a>
          <button id="edit-game-btn" class="chip" style="display:none;border:none;cursor:pointer;" type="button">Редактировать игру (admin)</button>
        </div>
        <div id="platforms" class="chips"></div>
      </div>
    </article>
  </div>

  <script>
    const gameId = '{{ game_id }}';
    const sessionLink = document.getElementById('session-link');
    const statsLink = document.getElementById('stats-link');
    const editGameBtn = document.getElementById('edit-game-btn');

    function isAuthenticated() {
      return Boolean(localStorage.getItem('access_token'));
    }

    function disableLink(link, message) {
      link.classList.add('disabled');
      link.addEventListener('click', (event) => {
        event.preventDefault();
        alert(message);
      });
    }


    async function isAdminUser() {
      const token = localStorage.getItem('access_token');
      if (!token) return false;
      const response = await fetch('/api/users/profile/', {
        headers: { Authorization: `Bearer ${token}` }
      });
      if (!response.ok) return false;
      const user = await response.json();
      return user.username === 'admin';
    }

    async function editGame(game) {
      const title = prompt('Новое название игры:', game.title);
      if (title === null) return;
      const description = prompt('Новое описание игры:', game.description || '');
      if (description === null) return;

      const response = await fetch(`/api/games/${game.id}/`, {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${localStorage.getItem('access_token')}`,
        },
        body: JSON.stringify({ title: title.trim(), description: description.trim() }),
      });

      if (!response.ok) {
        alert('Не удалось обновить игру. Проверьте права доступа.');
        return;
      }

      alert('Игра обновлена.');
      loadGame();
    }

    async function loadGame() {
      const response = await fetch(`/api/games/${gameId}/`);
      if (!response.ok) {
        document.getElementById('title').textContent = 'Игра не найдена';
        return;
      }

      const game = await response.json();
      if (await isAdminUser()) {
        editGameBtn.style.display = 'inline-block';
        editGameBtn.onclick = () => editGame(game);
      }
      document.title = `GameGor — ${game.title}`;
      document.getElementById('cover').src = game.cover_image || 'https://placehold.co/1200x600?text=GameGor';
      document.getElementById('cover').alt = game.title;
      document.getElementById('title').textContent = game.title;
      document.getElementById('genre').textContent = `Жанр: ${game.genre || '—'}`;
      document.getElementById('developer').textContent = `Разработчик: ${game.developer || '—'}`;
      document.getElementById('release').textContent = `Дата релиза: ${game.release_date || '—'}`;
      document.getElementById('achievements').textContent = `Достижений в игре: ${game.total_achievements ?? 0}`;
      document.getElementById('description').textContent = game.description || 'Описание пока не добавлено.';
      if (isAuthenticated()) {
        sessionLink.href = `/games/${game.id}/session/new/`;
      } else {
        sessionLink.textContent = 'Авторизуйтесь, чтобы добавить сессию';
        disableLink(sessionLink, 'Для создания игровой сессии нужно войти в систему.');
      }

      if (!isAuthenticated()) {
        disableLink(statsLink, 'Для просмотра статистики нужно войти в систему.');
      }

      const platforms = document.getElementById('platforms');
      const list = game.platforms || [];
      if (!list.length) {
        platforms.innerHTML = '<span class="chip">Платформы не указаны</span>';
      } else {
        platforms.innerHTML = list.map(p => `<span class="chip">${p.name} (${p.type})</span>`).join('');
      }
    }

    loadGame();
  </script>
</body>
</html>
