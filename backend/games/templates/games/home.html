<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameGor — Главная</title>
  <style>
    body { margin:0; font-family: Inter, Arial, sans-serif; background:#0b1220; color:#e5e7eb; }
    .wrap { max-width:1100px; margin:24px auto; padding:0 16px; }
    h1 { margin:0 0 6px; }
    .muted { color:#9ca3af; }
    .top { display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
    .links a { color:#cbd5e1; text-decoration:none; margin-left:12px; }
    .search { display:flex; gap:10px; margin-bottom:18px; }
    input { flex:1; border:1px solid #2b3a52; background:#111827; color:#e5e7eb; border-radius:10px; padding:11px 12px; }
    button { border:none; background:#22c55e; color:#052e16; font-weight:700; border-radius:10px; padding:11px 14px; cursor:pointer; }
    .grid { display:grid; gap:14px; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
    .card { background:#111827; border:1px solid #253042; border-radius:14px; overflow:hidden; display:flex; flex-direction:column; }
    .cover { width:100%; height:130px; object-fit:cover; background:#0f172a; }
    .content { padding:12px; }
    .title { font-size:16px; font-weight:700; margin-bottom:6px; }
    .meta { font-size:13px; color:#9ca3af; margin-bottom:8px; }
    .card a { margin-top:auto; display:block; text-align:center; text-decoration:none; color:#e2e8f0; background:#1e293b; padding:10px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>GameGor</h1>
        <div class="muted">Поиск по названиям игр и переход к карточке игры</div>
      </div>
      <div class="links">
        <a href="/api/auth/" id="auth-link">Вход/регистрация</a>
        <a href="/api/profile-page/" id="profile-link">Профиль</a>
        <a href="/api/stats-page/" id="stats-link">Статистика</a>
        <a href="/api/sessions-page/" id="sessions-link">Мои сессии</a>
        <a href="/videos/" id="videos-link">Видеоконтент</a>
      </div>
    </div>

    <form id="search-form" class="search">
      <input id="search-input" placeholder="Введите название игры (например, Counter-Strike)" />
      <button type="submit">Найти</button>
    </form>

    <div id="count" class="muted" style="margin-bottom:10px"></div>
    <section id="games-grid" class="grid"></section>
  </div>

  <button id="add-game-fab" type="button" style="display:none;position:fixed;right:20px;bottom:20px;z-index:20;background:#16a34a;color:#ecfdf5;border:none;border-radius:999px;padding:14px 18px;font-weight:800;box-shadow:0 8px 24px rgba(0,0,0,.35);">+ Добавить игру</button>

  <div id="add-game-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:30;align-items:center;justify-content:center;">
    <div style="width:min(620px,92vw);background:#111827;border:1px solid #253042;border-radius:14px;padding:16px;">
      <h3 style="margin-top:0;">Новая игра</h3>
      <div style="display:grid;gap:8px;">
        <input id="new-game-title" placeholder="Название"/>
        <input id="new-game-genre" placeholder="Жанр"/>
        <input id="new-game-developer" placeholder="Разработчик"/>
        <input id="new-game-release-date" placeholder="Дата релиза (YYYY-MM-DD)"/>
        <input id="new-game-cover" placeholder="Ссылка на обложку (URL)"/>
      </div>
      <div style="display:flex;gap:10px;margin-top:12px;">
        <button id="save-game-btn" type="button">Сохранить</button>
        <button id="cancel-game-btn" type="button" style="background:#334155;color:#e2e8f0;">Отмена</button>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('search-form');
    const input = document.getElementById('search-input');
    const grid = document.getElementById('games-grid');
    const count = document.getElementById('count');
    const profileLink = document.getElementById('profile-link');
    const statsLink = document.getElementById('stats-link');
    const sessionsLink = document.getElementById('sessions-link');
    const authLink = document.getElementById('auth-link');
    const addGameFab = document.getElementById('add-game-fab');
    const addGameModal = document.getElementById('add-game-modal');

    function token() { return localStorage.getItem('access_token'); }

    async function hasValidSession() {
      if (!token()) return false;
      const response = await fetch('/api/users/profile/', { headers: { Authorization: `Bearer ${token()}` } });
      return response.ok;
    }

    function protectNavigation(link, label) {
      link.addEventListener('click', (event) => {
        if (link.style.display === 'none') {
          event.preventDefault();
          return;
        }
        if (!token()) {
          event.preventDefault();
          alert(`Для перехода в раздел «${label}» сначала авторизуйтесь.`);
        }
      });
    }

    async function isAdminUser() {
      const t = token();
      if (!t) return false;
      const response = await fetch('/api/users/profile/', { headers: { Authorization: `Bearer ${t}` } });
      if (!response.ok) return false;
      const user = await response.json();
      return user.username === 'admin';
    }

    async function applyAuthUiState() {
      const valid = await hasValidSession();
      if (valid) {
        authLink.style.display = 'none';
        profileLink.style.display = 'inline';
        statsLink.style.display = 'inline';
        sessionsLink.style.display = 'inline';
      } else {
        profileLink.style.display = 'none';
        statsLink.style.display = 'none';
        sessionsLink.style.display = 'none';
        authLink.style.display = 'inline';
      }
    }

    protectNavigation(profileLink, 'Профиль');
    protectNavigation(statsLink, 'Статистика');
    protectNavigation(sessionsLink, 'Мои сессии');

    function gameCard(game) {
      const image = game.cover_image || 'https://placehold.co/640x360?text=GameGor';
      return `<article class="card"><img class="cover" src="${image}" alt="${game.title}" /><div class="content"><div class="title">${game.title}</div><div class="meta">Жанр: ${game.genre || '—'}</div><div class="meta">Разработчик: ${game.developer || '—'}</div><div class="meta">Релиз: ${game.release_date || '—'}</div></div><a href="/games/${game.id}/">Открыть страницу игры</a></article>`;
    }

    async function loadGames(search = '') {
      const query = search ? `?search=${encodeURIComponent(search)}` : '';
      const response = await fetch(`/api/games/${query}`);
      if (!response.ok) { count.textContent = 'Не удалось загрузить список игр'; return; }
      const data = await response.json();
      const games = Array.isArray(data) ? data : (data.results || []);
      count.textContent = `Найдено игр: ${games.length}`;
      grid.innerHTML = games.length ? games.map(gameCard).join('') : '<div class="muted">По вашему запросу ничего не найдено.</div>';
    }

    async function createGame() {
      const t = token();
      const payload = {
        title: document.getElementById('new-game-title').value.trim(),
        genre: document.getElementById('new-game-genre').value.trim(),
        developer: document.getElementById('new-game-developer').value.trim(),
        release_date: document.getElementById('new-game-release-date').value.trim() || null,
        cover_image: document.getElementById('new-game-cover').value.trim() || null,
      };
      if (!payload.title) { alert('Введите название игры.'); return; }
      const response = await fetch('/api/games/', { method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${t}` }, body: JSON.stringify(payload) });
      if (!response.ok) { alert('Не удалось добавить игру. Проверьте поля.'); return; }
      addGameModal.style.display = 'none';
      loadGames(input.value.trim());
    }

    document.getElementById('cancel-game-btn').addEventListener('click', () => { addGameModal.style.display = 'none'; });
    document.getElementById('save-game-btn').addEventListener('click', createGame);
    addGameFab.addEventListener('click', () => { addGameModal.style.display = 'flex'; });

    form.addEventListener('submit', (e) => { e.preventDefault(); loadGames(input.value.trim()); });
    applyAuthUiState().then(async () => { addGameFab.style.display = (await isAdminUser()) ? 'block' : 'none'; });
    loadGames('');
  </script>
</body>
</html>
