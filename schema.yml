components:
  schemas:
    Achievement:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 100
        description:
          type: string
        criteria_type:
          $ref: '#/components/schemas/CriteriaTypeEnum'
        threshold:
          type: integer
          maximum: 2147483647
          minimum: 0
      required:
      - criteria_type
      - description
      - id
      - threshold
      - title
    Author:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          title: Имя автора
          maxLength: 100
        channel_url:
          type: string
          format: uri
          title: Ссылка на канал
          maxLength: 200
        avatar:
          type: string
          format: uri
          nullable: true
          title: Аватар
          maxLength: 200
        subscribers_count:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          title: Подписчики
      required:
      - channel_url
      - id
      - name
    AuthorRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          title: Имя автора
          maxLength: 100
        channel_url:
          type: string
          format: uri
          minLength: 1
          title: Ссылка на канал
          maxLength: 200
        avatar:
          type: string
          format: uri
          nullable: true
          title: Аватар
          maxLength: 200
        subscribers_count:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          title: Подписчики
      required:
      - channel_url
      - name
    CriteriaTypeEnum:
      enum:
      - games_played
      - videos_watched
      - reviews_written
      type: string
      description: |-
        * `games_played` - Games Played
        * `videos_watched` - Videos Watched
        * `reviews_written` - Reviews Written
    Game:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          title: Название
          maxLength: 200
        genre:
          type: string
          title: Жанр
          maxLength: 100
        developer:
          type: string
          title: Разработчик
          maxLength: 200
        release_date:
          type: string
          format: date
          title: Дата релиза
        cover_image:
          type: string
          format: uri
          nullable: true
          title: Обложка
          maxLength: 200
        description:
          type: string
          nullable: true
          title: Описание
        platforms:
          type: array
          items:
            $ref: '#/components/schemas/Platform'
          readOnly: true
        total_achievements:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          title: Всего достижений
      required:
      - developer
      - genre
      - id
      - platforms
      - release_date
      - title
    GameRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          title: Название
          maxLength: 200
        genre:
          type: string
          minLength: 1
          title: Жанр
          maxLength: 100
        developer:
          type: string
          minLength: 1
          title: Разработчик
          maxLength: 200
        release_date:
          type: string
          format: date
          title: Дата релиза
        cover_image:
          type: string
          format: uri
          nullable: true
          title: Обложка
          maxLength: 200
        description:
          type: string
          nullable: true
          title: Описание
        total_achievements:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          title: Всего достижений
      required:
      - developer
      - genre
      - release_date
      - title
    GameSession:
      type: object
